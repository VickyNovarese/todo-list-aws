AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  todo-list-aws

  Application TODO-LIST with SAM format

Parameters:
  Stage:
    Type: String
    Default: default
    AllowedValues:
      - default
      - staging
      - production
    Description: Enter staging or production. Default is default

Globals:
  Function:
    Timeout: 3
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref TodosDynamoDbTable
        ENDPOINT_OVERRIDE: ""

Resources:

  # API explícita para que el StageName salga del parámetro Stage (samconfig.toml)
  TodosApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage

  CreateTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Handler: create.create
      Runtime: python3.12
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TodosApi
            Path: /todos
            Method: post

  ListTodosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Handler: list.list
      Runtime: python3.12
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TodosApi
            Path: /todos
            Method: get

  GetTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Handler: get.get
      Runtime: python3.12
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TodosApi
            Path: /todos/{id}
            Method: get

  UpdateTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Handler: update.update
      Runtime: python3.12
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TodosApi
            Path: /todos/{id}
            Method: put

  DeleteTodoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Handler: delete.delete
      Runtime: python3.12
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TodosApi
            Path: /todos/{id}
            Method: delete

  TodosDynamoDbTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Stage}-TodosDynamoDbTable"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

Outputs:
  BaseUrlApi:
    Description: "Base URL of API"
    Value: !Sub "https://${TodosApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"

  CreateTodoApi:
    Description: !Sub "Create TODO endpoint (${Stage})"
    Value: !Sub "https://${TodosApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/todos"

  ListTodosApi:
    Description: !Sub "List TODO endpoint (${Stage})"
    Value: !Sub "https://${TodosApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/todos"

  GetTodoApi:
    Description: !Sub "Get TODO endpoint (${Stage})"
    Value: !Sub "https://${TodosApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/todos/{id}"

  UpdateTodoApi:
    Description: !Sub "Update TODO endpoint (${Stage})"
    Value: !Sub "https://${TodosApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/todos/{id}"

  DeleteTodoApi:
    Description: !Sub "Delete TODO endpoint (${Stage})"
    Value: !Sub "https://${TodosApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/todos/{id}"